<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A1A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AGROBASE">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="manifest-link">
<link rel="apple-touch-icon" id="apple-icon">
<title>AGROBASE</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1A0A;--surface:#122012;--surface2:#1A2E1A;--border:#2A4A2A;
  --accent:#7EC44A;--text:#D8F0C8;--text2:#8CB878;--text3:#4A7040;
  --font-head:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);}
#hub{
  width:100%;height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 20px 32px;
  background:
    radial-gradient(ellipse at 15% 85%, rgba(60,120,30,0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(20,60,10,0.2) 0%, transparent 55%),
    var(--bg);
}
#hub.hidden{display:none;}
.hub-logo{text-align:center;margin-bottom:36px;}
.hub-mark{font-family:var(--font-head);font-size:62px;font-weight:800;letter-spacing:-3px;color:var(--accent);line-height:1;}
.hub-line{width:40px;height:2px;background:var(--accent);margin:10px auto 0;}
.hub-sub{font-family:var(--font-mono);font-size:13px;color:var(--text3);letter-spacing:4px;margin-top:10px;text-transform:uppercase;}
.hub-cards{width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px;}
.hub-card{
  display:flex;align-items:center;gap:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:18px 20px;cursor:pointer;
  transition:border-color .2s, background .2s;
}
.hub-card:active{background:var(--surface2);}
.hub-card-icon{
  width:48px;height:48px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;border:1px solid var(--border);
}
.hub-card-body{flex:1;min-width:0;}
.hub-card-title{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:.5px;color:var(--text);line-height:1;}
.hub-card-arr{font-size:20px;color:var(--border);flex-shrink:0;}
.mod-field .hub-card-icon{background:rgba(13,30,46,0.8);color:#5BC8F0;}
.mod-field:hover{border-color:#5BC8F0;}
.mod-campo .hub-card-icon{background:rgba(26,46,26,0.8);color:#A8D95A;}
.mod-campo:hover{border-color:#A8D95A;}
.mod-qual .hub-card-icon{background:rgba(37,99,235,0.1);color:#2563EB;}
.mod-qual:hover{border-color:#2563EB;}
.hub-footer{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:2px;text-align:center;margin-top:28px;}
#install-btn{
  display:none;margin-top:16px;
  font-family:var(--font-mono);font-size:12px;letter-spacing:1px;
  background:rgba(126,196,74,0.12);border:1px solid rgba(126,196,74,0.35);
  color:var(--accent);border-radius:6px;padding:8px 20px;cursor:pointer;
}
#frame-view{
  position:fixed;inset:0;width:100%;height:100%;
  display:none;flex-direction:column;z-index:100;background:#000;
}
#frame-view.active{display:flex;}
#frame-topbar{
  height:44px;flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:0 12px;background:#071010;border-bottom:1px solid #1a3020;
}
#frame-back{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:12px;color:#5a9060;letter-spacing:.5px;
  background:rgba(90,144,96,0.1);border:1px solid rgba(90,144,96,0.25);
  border-radius:5px;padding:5px 11px;cursor:pointer;
}
#frame-back:active{background:rgba(90,144,96,0.2);}
#frame-label{font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:.5px;flex:1;text-align:center;color:#8abe70;}
#app-frame{flex:1;width:100%;border:none;display:block;}
</style>
</head>
<body>
<div id="hub">
  <div class="hub-logo">
    <div class="hub-mark">AGRO<br>BASE</div>
    <div class="hub-line"></div>
    <div class="hub-sub">Plataforma de gestão</div>
  </div>
  <div class="hub-cards">
    <div class="hub-card mod-field" onclick="openApp('vistoria')">
      <div class="hub-card-icon">🗺️</div>
      <div class="hub-card-body"><div class="hub-card-title">VISTORIA DE CAMPO</div></div>
      <div class="hub-card-arr">›</div>
    </div>
    <div class="hub-card mod-campo" onclick="openApp('campo')">
      <div class="hub-card-icon">🌱</div>
      <div class="hub-card-body"><div class="hub-card-title">GESTÃO DE CAMPO</div></div>
      <div class="hub-card-arr">›</div>
    </div>
    <div class="hub-card mod-qual" onclick="openApp('qualidade')">
      <div class="hub-card-icon">📊</div>
      <div class="hub-card-body"><div class="hub-card-title">GESTÃO DE QUALIDADE</div></div>
      <div class="hub-card-arr">›</div>
    </div>
  </div>
  <button id="install-btn" onclick="installApp()">⬇ INSTALAR APP</button>
  <div class="hub-footer">ACESSO RESTRITO · AGROBASE</div>
</div>
<div id="frame-view">
  <div id="frame-topbar">
    <button id="frame-back" onclick="voltarHub()">← HUB</button>
    <div id="frame-label">AGROBASE</div>
    <div style="width:72px;"></div>
  </div>
  <iframe id="app-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups allow-downloads"></iframe>
</div>

// Service Worker
if('serviceWorker' in navigator){
  const swCode=`self.addEventListener('fetch',e=>{
    if(e.request.url.includes('fonts.googleapis')||e.request.url.includes('fonts.gstatic')){
      e.respondWith(fetch(e.request).catch(()=>new Response('')));
    }
  });`;
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// Install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-btn').style.display='block';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-btn').style.display='none';
  deferredPrompt=null;
});
function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}
}

function b64toBlob(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new Blob([bytes],{type:'text/html;charset=utf-8'});

let currentBlob=null;
function openApp(key){
  const blob=b64toBlob(APPS[key].b64);
  if(currentBlob)URL.revokeObjectURL(currentBlob);
  currentBlob=URL.createObjectURL(blob);
  document.getElementById('frame-label').textContent=APPS[key].label;
  document.getElementById('app-frame').src=currentBlob;
  document.getElementById('hub').classList.add('hidden');
  document.getElementById('frame-view').classList.add('active');
}
function voltarHub(){
  if(!confirm('Sair do módulo e voltar ao hub?'))return;
  document.getElementById('frame-view').classList.remove('active');
  document.getElementById('hub').classList.remove('hidden');
  document.getElementById('app-frame').src='about:blank';
  if(currentBlob){URL.revokeObjectURL(currentBlob);currentBlob=null;}
}
</script>
